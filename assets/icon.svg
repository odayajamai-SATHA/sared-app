<svg xmlns="http://www.w3.org/2000/svg" width="1024" height="1024" viewBox="0 0 1024 1024">
  <!-- White circle background -->
  <circle cx="512" cy="512" r="512" fill="#FFFFFF"/>

  <!-- Subtle orange ring -->
  <circle cx="512" cy="512" r="480" fill="none" stroke="#059669" stroke-width="8" opacity="0.3"/>

  <!-- Orange flatbed truck silhouette -->
  <g transform="translate(160, 320)" fill="#059669">
    <!-- Truck cab -->
    <path d="M520,200 L520,80 C520,60 530,40 560,40 L640,40 C660,40 680,60 680,80 L680,120 L700,120 C720,120 740,140 740,160 L740,200 Z"/>

    <!-- Cab window -->
    <path d="M540,90 L540,130 L620,130 L620,60 L560,60 C548,60 540,72 540,90 Z" fill="#FFFFFF" opacity="0.9"/>

    <!-- Flatbed body -->
    <rect x="40" y="160" width="500" height="50" rx="6"/>

    <!-- Flatbed platform/deck -->
    <rect x="20" y="140" width="520" height="25" rx="4"/>

    <!-- Hydraulic ramp (angled at back) -->
    <path d="M20,165 L-40,240 L0,240 L60,165 Z" opacity="0.8"/>

    <!-- Wheel wells -->
    <rect x="80" y="200" width="100" height="30" rx="4" fill="#047857"/>
    <rect x="560" y="200" width="120" height="30" rx="4" fill="#047857"/>

    <!-- Front wheel -->
    <circle cx="620" cy="240" r="44" fill="#374151"/>
    <circle cx="620" cy="240" r="28" fill="#6B7280"/>
    <circle cx="620" cy="240" r="12" fill="#374151"/>

    <!-- Rear wheel 1 -->
    <circle cx="160" cy="240" r="44" fill="#374151"/>
    <circle cx="160" cy="240" r="28" fill="#6B7280"/>
    <circle cx="160" cy="240" r="12" fill="#374151"/>

    <!-- Rear wheel 2 -->
    <circle cx="100" cy="240" r="44" fill="#374151"/>
    <circle cx="100" cy="240" r="28" fill="#6B7280"/>
    <circle cx="100" cy="240" r="12" fill="#374151"/>

    <!-- Headlight -->
    <rect x="735" y="130" width="12" height="20" rx="3" fill="#FCD34D"/>

    <!-- Tail light -->
    <rect x="-36" y="200" width="10" height="16" rx="2" fill="#EF4444"/>
  </g>

  <!-- "SARED" text in English -->
  <text x="512" y="680" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-weight="bold" font-size="80" fill="#059669" letter-spacing="8">SARED</text>

  <!-- "سارد" text in Arabic -->
  <text x="512" y="750" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-weight="bold" font-size="60" fill="#047857">سارد</text>
</svg>
